<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <main class="calculator-panel" aria-label="Scientific calculator">
        <div class="display">
          <output class="display-value" id="display">0</output>
          <div class="mode-toggles" role="group" aria-label="Angle mode">
            <button type="button" class="mode-btn is-active" id="degBtn" data-mode="deg">
              DEG
            </button>
            <button type="button" class="mode-btn" id="radBtn" data-mode="rad">RAD</button>
          </div>
        </div>

        <div class="keypad" role="group" aria-label="Keypad">
          <button type="button" class="key key-fn" data-action="mc">MC</button>
          <button type="button" class="key key-fn" data-action="mr">MR</button>
          <button type="button" class="key key-fn" data-action="mplus">M+</button>
          <button type="button" class="key key-fn" data-action="mminus">M−</button>
          <button type="button" class="key key-danger" data-action="reset" aria-label="Reset">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path
                fill="currentColor"
                d="M12 6V3L8 7l4 4V8c2.76 0 5 2.24 5 5 0 1.85-1 3.46-2.48 4.32l1.46 1.46C18.45 17.79 19.5 15.97 19.5 14c0-3.87-3.13-7-7-7zm-7.5 8c0-1.85 1-3.46 2.48-4.32L5.52 8.22C5.55 8.15 6.45 9.94 6.5 12c0 3.87 3.13 7 7 7v3l4-4-4-4v3c-2.76 0-5-2.24-5-5z"
              />
            </svg>
          </button>

          <button type="button" class="key key-fn" data-action="sin">sin</button>
          <button type="button" class="key key-fn" data-action="cos">cos</button>
          <button type="button" class="key key-fn" data-action="tan">tan</button>
          <button type="button" class="key key-fn" data-action="log">log</button>
          <button type="button" class="key key-fn" data-action="ln">ln</button>

          <button type="button" class="key key-fn" data-action="pi">π</button>
          <button type="button" class="key key-fn" data-action="e">e</button>
          <button type="button" class="key key-fn" data-action="sqrt">√</button>
          <button type="button" class="key key-fn" data-action="pow">x<sup>y</sup></button>
          <button type="button" class="key key-fn" data-action="percent">%</button>

          <button type="button" class="key key-num" data-action="num" data-value="7">7</button>
          <button type="button" class="key key-num" data-action="num" data-value="8">8</button>
          <button type="button" class="key key-num" data-action="num" data-value="9">9</button>
          <button type="button" class="key key-op" data-action="op" data-value="/">÷</button>
          <button type="button" class="key key-fn" data-action="backspace" aria-label="Backspace">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path
                fill="currentColor"
                d="M22 3H7c-.69 0-1.23.35-1.59.88L0 12l5.41 8.11c.36.53.9.89 1.59.89h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-3 12.59L17.59 17 14 13.41 10.41 17 9 15.59 12.59 12 9 8.41 10.41 7 14 10.59 17.59 7 19 8.41 15.41 12 19 15.59z"
              />
            </svg>
          </button>

          <button type="button" class="key key-num" data-action="num" data-value="4">4</button>
          <button type="button" class="key key-num" data-action="num" data-value="5">5</button>
          <button type="button" class="key key-num" data-action="num" data-value="6">6</button>
          <button type="button" class="key key-op" data-action="op" data-value="*">×</button>
          <button type="button" class="key key-fn" data-action="paren" data-value="(">(</button>

          <button type="button" class="key key-num" data-action="num" data-value="1">1</button>
          <button type="button" class="key key-num" data-action="num" data-value="2">2</button>
          <button type="button" class="key key-num" data-action="num" data-value="3">3</button>
          <button type="button" class="key key-op" data-action="op" data-value="-">−</button>
          <button type="button" class="key key-fn" data-action="paren" data-value=")">)</button>

          <button type="button" class="key key-fn" data-action="negate">±</button>
          <button type="button" class="key key-num" data-action="num" data-value="0">0</button>
          <button type="button" class="key key-num" data-action="num" data-value=".">.</button>
          <button type="button" class="key key-op" data-action="op" data-value="+">+</button>
          <button type="button" class="key key-eq" data-action="equals">=</button>
        </div>
      </main>

      <aside class="history-panel" aria-label="Calculation history">
        <h2 class="history-title">History (<span id="histCount">0</span>/10)</h2>
        <div class="history-empty" id="historyEmpty">No calculations yet</div>
        <ul class="history-list" id="historyList" hidden></ul>
      </aside>
    </div>
    <script src="app.js"></script>
  </body>
</html>
